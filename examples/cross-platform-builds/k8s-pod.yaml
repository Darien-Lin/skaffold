apiVersion: v1
kind: Pod
metadata:
  name: getting-started
spec:
  tolerations:
  - operator: "Exists"
  affinity:
    nodeAffinity:
      requiredDuringSchedulingIgnoredDuringExecution:
        nodeSelectorTerms:
        - matchExpressions:
          - key: kubernetes.io/arch
            operator: In
            values:
            - amd64
            - arm64
  containers:
  - name: getting-started
    image: skaffold-example